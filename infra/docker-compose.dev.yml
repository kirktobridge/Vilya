version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
      POSTGRES_DB: kalshi_bot
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d kalshi_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://bot:bot@postgres:5432/kalshi_bot
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"   # Prometheus metrics
    volumes:
      - ../src:/app/src   # hot-reload in dev
      - model_artifacts:/app/artifacts

volumes:
  pg_data:
  model_artifacts:
